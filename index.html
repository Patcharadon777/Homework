<!DOCTYPE html>
<html>
<ul id="taskList"></ul>
<div id="login-box">
    <input type="text" id="usernameInput" placeholder="ตั้งชื่อผู้ใช้ของคุณ">
    <button onclick="setUser()">เริ่มใช้งาน</button>
</div>

<div id="user-info" style="display:none;">
    <h3 id="welcomeText"></h3>
    <button onclick="changeUser()">เปลี่ยนผู้ใช้</button>
</div>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Homework Tracker</title>

    <style>
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            object-fit: cover;
            /* ทำให้เต็มจอแบบไม่ยืด */
            z-index: -1;
            /* ให้อยู่หลังเนื้อหา */
        }

        @media (max-width: 768px) {
            .bg-video {
                object-fit: cover;
            }
        }

        .card {
            width: 95%;
            max-width: 500px;
            margin: auto;
        }

        button {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            h2 {
                font-size: 20px;
            }

            .card {
                padding: 15px;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* ปิดการเลื่อนแนวนอน */
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        #taskList {
            max-height: 300px;
            /* กำหนดความสูงพื้นที่แสดงงาน */
            overflow-y: auto;
            /* เลื่อนแนวตั้ง */
            overflow-x: hidden;
            /* ปิดเลื่อนแนวนอน */
        }

        .title {
            text-align: center;
            color: white;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        #taskList::-webkit-scrollbar {
            width: 6px;
        }

        #taskList::-webkit-scrollbar-thumb {
            background: #6a5af9;
            border-radius: 10px;
        }

        #taskList::-webkit-scrollbar {
            width: 24px;
            /* ปรับตัวเลขให้ใหญ่ขึ้นได้ เช่น 16px */
        }

        #taskList::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            /* พื้นหลังรางเลื่อน */
            border-radius: 10px;
        }

        #taskList::-webkit-scrollbar-thumb {
            background: #6a5af9;
            /* สีแท่งเลื่อน */
            border-radius: 10px;
            border: 3px solid transparent;
            /* ทำให้ดูหนานุ่มขึ้น */
        }

        #taskList::-webkit-scrollbar-thumb:hover {
            background: #8f7bff;
        }

        .task-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            /* ระยะห่างระหว่าง checkbox กับปุ่มลบ */
        }

        .card {
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        #taskList {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .card {
            display: flex;
            flex-direction: column;
        }

        #taskList {
            width: 100%;
            margin-top: 20px;
        }

        #taskList li {
            width: 100%;
        }

        #taskList li {
            width: 100%;
        }

        #taskList {
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        #user-info {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        body {
            position: relative;
        }

        #usernameInput #usernameInput:focus {
            box-shadow: 0 0 10px #6a00ff;
            border-color: #6a00ff;
        }

        #login-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        #username #username:focus {
            width: 180px;
            /* ความกว้าง */
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #555;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            outline: none;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }


        /* ทำให้พื้นหลังอ่านง่ายขึ้น */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff
        }

        /* Black Hole Core */
        .blackhole {
            position: absolute;
            width: 250px;
            height: 250px;
            background: black;
            border-radius: 50%;
            box-shadow: 0 0 80px 40px rgba(255, 255, 255, 0.05);
            z-index: 3;
        }

        /* Accretion Disk */
        .disk {
            position: absolute;
            width: 600px;
            height: 200px;
            background: linear-gradient(90deg,
                    transparent,
                    #ff7b00,
                    #ffffff,
                    #ff7b00,
                    transparent);
            border-radius: 50%;
            filter: blur(25px);
            animation: rotateDisk 12s linear infinite;
            z-index: 2;
        }

        /* Light Bending Glow */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4), transparent 70%);
            filter: blur(50px);
            z-index: 1;
        }

        @keyframes rotateDisk {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .card {
            width: 420px;
            height: 85vh;
            padding: 30px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            background: rgba(20, 20, 30, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        .container {
            position: relative;
            z-index: 10;
            /* ทำให้ลอยอยู่หน้าสุด */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 450px;
            box-shadow: 0 0 40px rgba(108, 99, 255, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input,
        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        input[type="text"] {
            flex: 1;
        }

        input[type="date"] {
            background: #222;
            color: white;
        }

        button {
            background: #6c63ff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #5848c2;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.08);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .task-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .delete-btn {
            background: crimson;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <video autoplay loop muted playsinline class="bg-video">
        <source src="blackhole.mp4" type="video/mp4">
    </video>
    <audio id="bg-music" loop preload="auto">
        <source src="VISIONSLOWED.mp3" type="audio/mp3">
    </audio>

    <div class="card">

        <h2 class="title">การบ้านค้าบบ</h2>

        <div class="input-section">
            <button id="musicBtn">🎵 เปิดเพลง</button>
            <input type="text" id="taskInput" placeholder="ชื่องาน">

            <input type="date" id="dateInput">

            <div class="file-section">
                <input type="file" id="imageInput" multiple>
                <button class="add-btn" onclick="addTask()">เพิ่ม</button>
            </div>

        </div>

        <ul id="taskList"></ul>

    </div>

    <script>
        function showImageModal(src) {

            let modal = document.createElement("div");
            modal.style.position = "fixed";
            modal.style.top = "0";
            modal.style.left = "0";
            modal.style.width = "100%";
            modal.style.height = "100%";
            modal.style.backgroundColor = "rgba(0,0,0,0.8)";
            modal.style.display = "flex";
            modal.style.alignItems = "center";
            modal.style.justifyContent = "center";
            modal.style.zIndex = "9999";

            let img = document.createElement("img");
            img.src = src;
            img.style.maxWidth = "90%";
            img.style.maxHeight = "90%";
            img.style.borderRadius = "12px";

            modal.appendChild(img);

            modal.onclick = function () {
                modal.remove();
            };

            document.body.appendChild(modal);
        }
        let currentUser = localStorage.getItem("currentUser");
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        function saveTasks() {
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        window.onload = function () {
            if (currentUser) {
                showApp();
                loadTasks();
            }
        };

        function setUser() {
            let name = document.getElementById("usernameInput").value.trim();

            if (name === "") {
                alert("กรุณาตั้งชื่อก่อน");
                return;
            }

            currentUser = name;
            localStorage.setItem("currentUser", name);

            showApp();
            loadTasks();
        }

        function showApp() {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("user-info").style.display = "block";
            document.getElementById("welcomeText").innerText =
                "🌌 ผู้ใช้: " + currentUser;
        }

        function changeUser() {
            localStorage.removeItem("currentUser");
            location.reload();
        }
        function saveUsername() {
            let name = document.getElementById("username").value.trim();

            if (name === "") {
                alert("กรุณาใส่ชื่อก่อน");
                return;
            }

            currentUser = name;
            localStorage.setItem("currentUser", name);
            loadTasks();
        }
        function saveUsername() {
            let name = document.getElementById("username").value.trim();

            if (name === "") {
                alert("กรุณาใส่ชื่อก่อน");
                return;
            }

            currentUser = name;
            localStorage.setItem("currentUser", name);
            loadTasks();
        }
        const music = document.getElementById("bg-music");
        const musicBtn = document.getElementById("musicBtn");

        musicBtn.addEventListener("click", function () {
            if (music.paused) {
                music.play().then(() => {
                    musicBtn.textContent = "🔇 ปิดเพลง";
                }).catch(error => {
                    console.log("Play error:", error);
                });
            } else {
                music.pause();
                musicBtn.textContent = "🎵 เปิดเพลง";
            }
        });

        dbOnValue(dbRef(db, "tasks"), (snapshot) => {

            const taskList = document.getElementById("taskList");
            taskList.innerHTML = "";

            const data = snapshot.val();
            if (!data) return;

            Object.values(data).forEach((task, index) => {

                if (task.user !== currentUser) return;

                let li = renderTask(task, index);
                taskList.appendChild(li);

            });

        });

        function addTask() {

            if (!currentUser) {
                alert("กรุณาตั้งชื่อก่อน");
                return;
            }

            let taskInput = document.getElementById("taskInput").value;
            let dueDate = document.getElementById("dateInput").value;
            let files = document.getElementById("imageInput").files;

            if (taskInput.trim() === "") return;

            let imageArray = [];

            if (files.length > 0) {

                let filesProcessed = 0;

                for (let i = 0; i < files.length; i++) {

                    let reader = new FileReader();

                    reader.onload = function (e) {
                        imageArray.push(e.target.result);
                        filesProcessed++;

                        if (filesProcessed === files.length) {
                            createTask(imageArray);
                        }
                    };

                    reader.readAsDataURL(files[i]);
                }

            } else {
                createTask([]);
            }

            function createTask(images) {

                let taskInput = document.getElementById("taskInput").value;
                let dueDate = document.getElementById("dateInput").value;

                dbPush(dbRef(db, "tasks"), {
                    text: taskInput,
                    date: dueDate,
                    images: images,
                    user: currentUser
                });

            }

            tasks.push(task);
            saveTasks();

            let li = renderTask(task);
            document.getElementById("taskList").appendChild(li);

            document.getElementById("taskInput").value = "";
            document.getElementById("imageInput").value = "";
        }


        function renderTask(task, index) {

            let li = document.createElement("li");

            let topDiv = document.createElement("div");
            topDiv.className = "task-top";

            let leftSide = document.createElement("div");

            // ข้อความงาน
            let span = document.createElement("span");
            span.textContent = task.text;

            if (task.completed) {
                span.classList.add("completed");
            }

            // วันกำหนดส่ง
            let dateText = document.createElement("small");
            dateText.textContent = "กำหนดส่ง: " + (task.dueDate || "ไม่ระบุ");

            // คนที่เพิ่ม
            let creator = document.createElement("small");
            creator.textContent = "👤 เพิ่มโดย: " + task.createdBy;
            creator.style.display = "block";
            creator.style.fontSize = "12px";
            creator.style.opacity = "0.7";

            leftSide.appendChild(span);
            leftSide.appendChild(document.createElement("br"));
            leftSide.appendChild(dateText);
            leftSide.appendChild(document.createElement("br"));
            leftSide.appendChild(creator);

            if (task.images && task.images.length > 0) {

                let imgContainer = document.createElement("div");
                imgContainer.style.display = "flex";
                imgContainer.style.flexWrap = "wrap";
                imgContainer.style.gap = "6px";
                imgContainer.style.marginTop = "8px";

                task.images.forEach(src => {

                    let img = document.createElement("img");
                    img.src = src;
                    img.style.width = "80px";
                    img.style.height = "80px";
                    img.style.objectFit = "cover";
                    img.style.borderRadius = "8px";
                    img.style.cursor = "pointer";

                    // 🔥 คลิกดูเต็มจอ
                    img.onclick = function () {
                        showImageModal(src);
                    };

                    imgContainer.appendChild(img);
                });

                leftSide.appendChild(imgContainer);
            }

            // ===== ฝั่งขวา (ปุ่มต่าง ๆ) =====
            let rightSide = document.createElement("div");


            // ✅ ปุ่มติ๊ก
            let checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = task.completed;

            checkbox.onchange = function () {
                task.completed = checkbox.checked;
                saveTasks();
                loadTasks();
            };

            // ✅ ปุ่มลบ
            let deleteBtn = document.createElement("button");
            deleteBtn.textContent = "ลบ";
            deleteBtn.className = "delete-btn";

            deleteBtn.onclick = function () {
                console.log("กดลบแล้ว", index);

                if (confirm("คุณแน่ใจหรือไม่ว่าต้องการลบงานนี้?")) {
                    console.log("currentUser =", currentUser);
                    tasks.splice(index, 1);
                    saveTasks();
                    loadTasks();
                }
            };

            rightSide.appendChild(checkbox);
            rightSide.appendChild(deleteBtn);

            // รวมซ้าย + ขวา
            topDiv.appendChild(leftSide);
            topDiv.appendChild(rightSide);

            li.appendChild(topDiv);

            return li;
        }

        function saveTasks() {
            if (!currentUser) return;
            localStorage.setItem("tasks_" + currentUser, JSON.stringify(tasks));
        }

    </script>
